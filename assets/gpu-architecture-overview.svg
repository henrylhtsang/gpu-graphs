<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" fill="#08111F"/>
  <rect x="40" y="40" width="1120" height="640" rx="28" fill="#0F1B2E" stroke="#20324D" stroke-width="2"/>
  <text x="80" y="105" fill="#F8FAFC" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">GPU Architecture Overview</text>
  <text x="80" y="145" fill="#9FB3C8" font-size="22" font-family="Arial, Helvetica, sans-serif">How modern GPUs organize compute, memory, and throughput-focused execution.</text>

  <rect x="80" y="190" width="320" height="430" rx="24" fill="#14243B" stroke="#345178"/>
  <text x="110" y="235" fill="#7DD3FC" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Streaming Multiprocessors</text>
  <text x="110" y="270" fill="#DCE7F3" font-size="20" font-family="Arial, Helvetica, sans-serif">Thousands of simple cores execute work in parallel.</text>
  <rect x="110" y="305" width="260" height="70" rx="16" fill="#1E3A5F"/>
  <text x="140" y="348" fill="#F8FAFC" font-size="24" font-family="Arial, Helvetica, sans-serif">Warp / Wavefront Scheduler</text>
  <rect x="110" y="395" width="260" height="70" rx="16" fill="#1E3A5F"/>
  <text x="165" y="438" fill="#F8FAFC" font-size="24" font-family="Arial, Helvetica, sans-serif">Tensor / SIMD Cores</text>
  <rect x="110" y="485" width="260" height="90" rx="16" fill="#1E3A5F"/>
  <text x="160" y="530" fill="#F8FAFC" font-size="24" font-family="Arial, Helvetica, sans-serif">Occupancy stays high</text>
  <text x="148" y="560" fill="#C7D7E8" font-size="18" font-family="Arial, Helvetica, sans-serif">when memory latency is hidden</text>

  <rect x="440" y="190" width="320" height="430" rx="24" fill="#14243B" stroke="#345178"/>
  <text x="470" y="235" fill="#86EFAC" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Memory Hierarchy</text>
  <text x="470" y="270" fill="#DCE7F3" font-size="20" font-family="Arial, Helvetica, sans-serif">Bandwidth is optimized by keeping data close to the cores.</text>
  <rect x="470" y="305" width="260" height="56" rx="14" fill="#214B39"/>
  <text x="580" y="341" text-anchor="middle" fill="#F8FAFC" font-size="22" font-family="Arial, Helvetica, sans-serif">Registers</text>
  <rect x="470" y="378" width="260" height="56" rx="14" fill="#256247"/>
  <text x="600" y="414" text-anchor="middle" fill="#F8FAFC" font-size="22" font-family="Arial, Helvetica, sans-serif">Shared / Local Memory</text>
  <rect x="470" y="451" width="260" height="56" rx="14" fill="#2F7A58"/>
  <text x="600" y="487" text-anchor="middle" fill="#F8FAFC" font-size="22" font-family="Arial, Helvetica, sans-serif">L2 Cache</text>
  <rect x="470" y="524" width="260" height="56" rx="14" fill="#38956C"/>
  <text x="600" y="560" text-anchor="middle" fill="#F8FAFC" font-size="22" font-family="Arial, Helvetica, sans-serif">VRAM / HBM</text>

  <rect x="800" y="190" width="320" height="430" rx="24" fill="#14243B" stroke="#345178"/>
  <text x="830" y="235" fill="#FDE68A" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Why GPUs Win</text>
  <text x="830" y="270" fill="#DCE7F3" font-size="20" font-family="Arial, Helvetica, sans-serif">They trade low-latency control for massive throughput.</text>
  <circle cx="865" cy="332" r="10" fill="#FBBF24"/>
  <text x="890" y="340" fill="#F8FAFC" font-size="22" font-family="Arial, Helvetica, sans-serif">Best for matrix math, shading, and simulation</text>
  <circle cx="865" cy="402" r="10" fill="#FBBF24"/>
  <text x="890" y="410" fill="#F8FAFC" font-size="22" font-family="Arial, Helvetica, sans-serif">High throughput from wide parallel execution</text>
  <circle cx="865" cy="472" r="10" fill="#FBBF24"/>
  <text x="890" y="480" fill="#F8FAFC" font-size="22" font-family="Arial, Helvetica, sans-serif">Peak performance depends on memory access patterns</text>
  <circle cx="865" cy="542" r="10" fill="#FBBF24"/>
  <text x="890" y="550" fill="#F8FAFC" font-size="22" font-family="Arial, Helvetica, sans-serif">Ideal workloads have many independent operations</text>

  <path d="M400 340H440" stroke="#4BA3FF" stroke-width="6" stroke-linecap="round"/>
  <path d="M760 340H800" stroke="#50C878" stroke-width="6" stroke-linecap="round"/>
  <text x="80" y="655" fill="#7B92AC" font-size="18" font-family="Arial, Helvetica, sans-serif">Tip: Keep work parallel, coalesce memory reads, and minimize idle threads.</text>
</svg>
