<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" fill="#0B1220"/>
  <rect x="40" y="40" width="1120" height="640" rx="28" fill="#111C30" stroke="#243552" stroke-width="2"/>
  <text x="80" y="105" fill="#F8FAFC" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">Common GPU Workloads</text>
  <text x="80" y="145" fill="#9FB3C8" font-size="22" font-family="Arial, Helvetica, sans-serif">A quick map of where GPU acceleration is commonly applied.</text>

  <rect x="80" y="200" width="240" height="170" rx="22" fill="#1B2D4A"/>
  <text x="110" y="250" fill="#93C5FD" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Graphics</text>
  <text x="110" y="292" fill="#E2E8F0" font-size="21" font-family="Arial, Helvetica, sans-serif">Rasterization</text>
  <text x="110" y="324" fill="#E2E8F0" font-size="21" font-family="Arial, Helvetica, sans-serif">Ray tracing</text>
  <text x="110" y="356" fill="#E2E8F0" font-size="21" font-family="Arial, Helvetica, sans-serif">Post-processing</text>

  <rect x="350" y="200" width="240" height="170" rx="22" fill="#1E3A36"/>
  <text x="380" y="250" fill="#86EFAC" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">AI / ML</text>
  <text x="380" y="292" fill="#E2E8F0" font-size="21" font-family="Arial, Helvetica, sans-serif">Training</text>
  <text x="380" y="324" fill="#E2E8F0" font-size="21" font-family="Arial, Helvetica, sans-serif">Inference</text>
  <text x="380" y="356" fill="#E2E8F0" font-size="21" font-family="Arial, Helvetica, sans-serif">Vector search</text>

  <rect x="620" y="200" width="240" height="170" rx="22" fill="#46321C"/>
  <text x="650" y="250" fill="#FCD34D" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Scientific</text>
  <text x="650" y="292" fill="#E2E8F0" font-size="21" font-family="Arial, Helvetica, sans-serif">Simulation</text>
  <text x="650" y="324" fill="#E2E8F0" font-size="21" font-family="Arial, Helvetica, sans-serif">Numerical solvers</text>
  <text x="650" y="356" fill="#E2E8F0" font-size="21" font-family="Arial, Helvetica, sans-serif">Signal processing</text>

  <rect x="890" y="200" width="240" height="170" rx="22" fill="#402149"/>
  <text x="920" y="250" fill="#F0ABFC" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Data</text>
  <text x="920" y="292" fill="#E2E8F0" font-size="21" font-family="Arial, Helvetica, sans-serif">Analytics</text>
  <text x="920" y="324" fill="#E2E8F0" font-size="21" font-family="Arial, Helvetica, sans-serif">ETL</text>
  <text x="920" y="356" fill="#E2E8F0" font-size="21" font-family="Arial, Helvetica, sans-serif">Databases</text>

  <rect x="80" y="430" width="1050" height="160" rx="24" fill="#16253D"/>
  <text x="110" y="480" fill="#F8FAFC" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Rule of thumb</text>
  <text x="110" y="522" fill="#DCE7F3" font-size="24" font-family="Arial, Helvetica, sans-serif">GPUs shine when the same operation can be applied to many inputs at once.</text>
  <text x="110" y="560" fill="#DCE7F3" font-size="24" font-family="Arial, Helvetica, sans-serif">Performance drops when work is highly sequential or branches diverge heavily.</text>

  <path d="M200 390V430" stroke="#60A5FA" stroke-width="6" stroke-linecap="round"/>
  <path d="M470 390V430" stroke="#4ADE80" stroke-width="6" stroke-linecap="round"/>
  <path d="M740 390V430" stroke="#FBBF24" stroke-width="6" stroke-linecap="round"/>
  <path d="M1010 390V430" stroke="#E879F9" stroke-width="6" stroke-linecap="round"/>

  <text x="80" y="645" fill="#7B92AC" font-size="18" font-family="Arial, Helvetica, sans-serif">SVG assets are editable and render well on GitHub and in browsers.</text>
</svg>
