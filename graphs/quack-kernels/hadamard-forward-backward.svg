<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000" role="img" aria-labelledby="title desc">
  <title id="title">QuACK Hadamard transform · hierarchical butterfly exchange</title>
  <desc id="desc">QuACK Hadamard transform · hierarchical butterfly exchange. Forward and backward reuse the same self-inverse transform, with caller-selected scaling. H(H(x)) = N·x; autograd invokes the same kernel again with the matching normalization scale.</desc>
  <defs>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172734; }
      .title { font-size: 34px; font-weight: 760; } .subtitle { font-size: 17px; fill: #425869; }
      .lane { font-size: 17px; font-weight: 730; } .lane-note { font-size: 13px; fill: #526a79; }
      .phase { font-size: 13px; font-weight: 700; fill: #607887; text-anchor: middle; letter-spacing: .6px; }
      .box { font-size: 15px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
      .mini { font-size: 12px; font-weight: 650; fill: #425869; text-anchor: middle; dominant-baseline: middle; }
      .node { stroke: #294251; stroke-width: 1.6; } .grid { stroke: #dce6ec; stroke-width: 1.2; }
      .arrow { fill: none; stroke: #526d7c; stroke-width: 2.2; marker-end: url(#arrow); }
      .dep { fill: none; stroke: #b87912; stroke-width: 2; stroke-dasharray: 6 5; marker-end: url(#gold); }
      .note { font-size: 15px; font-weight: 650; fill: #704b09; } .source { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; fill: #526a79; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#526d7c"/></marker>
    <marker id="gold" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#b87912"/></marker>
  </defs>
  <rect width="1800" height="1000" fill="#f8fafb"/>
  <text class="title" x="60" y="58">QuACK Hadamard transform · hierarchical butterfly exchange</text>
  <text class="subtitle" x="60" y="94">Forward and backward reuse the same self-inverse transform, with caller-selected scaling.</text>
  <text class="subtitle" x="60" y="122">CuTe DSL entry point: <tspan class="source">quack/transform/hadamard.py · HadamardTransform.kernel()</tspan></text>
  <rect x="50" y="160" width="1700" height="700" rx="9" fill="#fff" stroke="#d4e0e7" stroke-width="1.4"/>
  <line class="grid" x1="320" y1="160" x2="320" y2="860"/>
  <line class="grid" x1="50" y1="340" x2="1750" y2="340"/><line class="grid" x1="50" y1="500" x2="1750" y2="500"/><line class="grid" x1="50" y1="660" x2="1750" y2="660"/>
  <text class="phase" x="477" y="185">SET UP / LOAD</text><text class="phase" x="797" y="185">TRANSFORM</text><text class="phase" x="1117" y="185">SYNCHRONIZE / REDUCE</text><text class="phase" x="1437" y="185">PUBLISH / ADVANCE</text>
  <text class="lane" x="72" y="236">Persistent load loop</text><text class="lane-note" x="72" y="262">One or more rows per CTA</text><rect class="node" x="355" y="205" width="245" height="70" rx="10" fill="#d7e8f2"/><text class="box" x="477.5" y="241">load row tile</text><rect class="node" x="675" y="205" width="245" height="70" rx="10" fill="#d7e8f2"/><text class="box" x="797.5" y="241">optional cp.async</text><path class="arrow" d="M600 240 H673"/><rect class="node" x="995" y="205" width="245" height="70" rx="10" fill="#d7e8f2"/><text class="box" x="1117.5" y="241">wait current row</text><path class="arrow" d="M920 240 H993"/><rect class="node" x="1315" y="205" width="245" height="70" rx="10" fill="#d7e8f2"/><text class="box" x="1437.5" y="241">prefetch next row</text><path class="arrow" d="M1240 240 H1313"/><text class="lane" x="72" y="396">Thread-local butterflies</text><text class="lane-note" x="72" y="422">Register-resident radix stages</text><rect class="node" x="355" y="365" width="245" height="70" rx="10" fill="#cfe9df"/><text class="box" x="477.5" y="401">reshape by radix</text><rect class="node" x="675" y="365" width="245" height="70" rx="10" fill="#cfe9df"/><text class="box" x="797.5" y="401">a+b / a−b</text><path class="arrow" d="M600 400 H673"/><rect class="node" x="995" y="365" width="245" height="70" rx="10" fill="#cfe9df"/><text class="box" x="1117.5" y="401">repeat local bits</text><path class="arrow" d="M920 400 H993"/><rect class="node" x="1315" y="365" width="245" height="70" rx="10" fill="#cfe9df"/><text class="box" x="1437.5" y="401">hold FP32 values</text><path class="arrow" d="M1240 400 H1313"/><text class="lane" x="72" y="556">Cross-thread exchange</text><text class="lane-note" x="72" y="582">Shuffle for small plans, smem otherwise</text><rect class="node" x="355" y="525" width="245" height="70" rx="10" fill="#8bcdb8"/><text class="box" x="477.5" y="561">warp shuffle path</text><rect class="node" x="675" y="525" width="245" height="70" rx="10" fill="#8bcdb8"/><text class="box" x="797.5" y="561">or store s_exchange</text><path class="arrow" d="M600 560 H673"/><rect class="node" x="995" y="525" width="245" height="70" rx="10" fill="#8bcdb8"/><text class="box" x="1117.5" y="561">warp/CTA barrier</text><path class="arrow" d="M920 560 H993"/><rect class="node" x="1315" y="525" width="245" height="70" rx="10" fill="#8bcdb8"/><text class="box" x="1437.5" y="561">load permuted bits</text><path class="arrow" d="M1240 560 H1313"/><text class="lane" x="72" y="716">Scale + store</text><text class="lane-note" x="72" y="742">Tail may store directly</text><rect class="node" x="355" y="685" width="245" height="70" rx="10" fill="#f2d394"/><text class="box" x="477.5" y="721">final butterfly stage</text><rect class="node" x="675" y="685" width="245" height="70" rx="10" fill="#f2d394"/><text class="box" x="797.5" y="721">× scale</text><path class="arrow" d="M600 720 H673"/><rect class="node" x="995" y="685" width="245" height="70" rx="10" fill="#f2d394"/><text class="box" x="1117.5" y="711">direct tail layout</text><text class="mini" x="1117.5" y="736">or rmem output</text><path class="arrow" d="M920 720 H993"/><rect class="node" x="1315" y="685" width="245" height="70" rx="10" fill="#f2d394"/><text class="box" x="1437.5" y="721">predicated vector store</text><path class="arrow" d="M1240 720 H1313"/><path class="dep" d="M477.5 275 V363"/><path class="dep" d="M797.5 435 V523"/><path class="dep" d="M1117.5 595 V683"/>
  <rect x="60" y="892" width="1680" height="62" rx="10" fill="#fff7df" stroke="#b87912" stroke-width="1.5"/>
  <text class="note" x="85" y="929">H(H(x)) = N·x; autograd invokes the same kernel again with the matching normalization scale.</text>
</svg>
