<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000" role="img" aria-labelledby="title desc">
  <title id="title">QuACK RMS final reduction · partial sums to reciprocal stddev</title>
  <desc id="desc">QuACK RMS final reduction · partial sums to reciprocal stddev. A compact reduction kernel closes multi-stage RMS statistics. This kernel reduces sums (not squares itself); scale encodes the normalization applied to upstream partials.</desc>
  <defs>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172734; }
      .title { font-size: 34px; font-weight: 760; } .subtitle { font-size: 17px; fill: #425869; }
      .lane { font-size: 17px; font-weight: 730; } .lane-note { font-size: 13px; fill: #526a79; }
      .phase { font-size: 13px; font-weight: 700; fill: #607887; text-anchor: middle; letter-spacing: .6px; }
      .box { font-size: 15px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
      .mini { font-size: 12px; font-weight: 650; fill: #425869; text-anchor: middle; dominant-baseline: middle; }
      .node { stroke: #294251; stroke-width: 1.6; } .grid { stroke: #dce6ec; stroke-width: 1.2; }
      .arrow { fill: none; stroke: #526d7c; stroke-width: 2.2; marker-end: url(#arrow); }
      .dep { fill: none; stroke: #b87912; stroke-width: 2; stroke-dasharray: 6 5; marker-end: url(#gold); }
      .note { font-size: 15px; font-weight: 650; fill: #704b09; } .source { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; fill: #526a79; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#526d7c"/></marker>
    <marker id="gold" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#b87912"/></marker>
  </defs>
  <rect width="1800" height="1000" fill="#f8fafb"/>
  <text class="title" x="60" y="58">QuACK RMS final reduction · partial sums to reciprocal stddev</text>
  <text class="subtitle" x="60" y="94">A compact reduction kernel closes multi-stage RMS statistics.</text>
  <text class="subtitle" x="60" y="122">CuTe DSL entry point: <tspan class="source">quack/rms_final_reduce.py · RmsFinalReduce.kernel()</tspan></text>
  <rect x="50" y="160" width="1700" height="700" rx="9" fill="#fff" stroke="#d4e0e7" stroke-width="1.4"/>
  <line class="grid" x1="320" y1="160" x2="320" y2="860"/>
  <line class="grid" x1="50" y1="340" x2="1750" y2="340"/><line class="grid" x1="50" y1="500" x2="1750" y2="500"/><line class="grid" x1="50" y1="660" x2="1750" y2="660"/>
  <text class="phase" x="477" y="185">SET UP / LOAD</text><text class="phase" x="797" y="185">TRANSFORM</text><text class="phase" x="1117" y="185">SYNCHRONIZE / REDUCE</text><text class="phase" x="1437" y="185">PUBLISH / ADVANCE</text>
  <text class="lane" x="72" y="236">Load partials</text><text class="lane-note" x="72" y="262">One row of accumulated statistics</text><rect class="node" x="355" y="205" width="245" height="70" rx="10" fill="#d7e8f2"/><text class="box" x="477.5" y="241">tile partial-sum matrix</text><rect class="node" x="675" y="205" width="245" height="70" rx="10" fill="#d7e8f2"/><text class="box" x="797.5" y="241">predicate tail N</text><path class="arrow" d="M600 240 H673"/><rect class="node" x="995" y="205" width="245" height="70" rx="10" fill="#d7e8f2"/><text class="box" x="1117.5" y="241">load to registers</text><path class="arrow" d="M920 240 H993"/><rect class="node" x="1315" y="205" width="245" height="70" rx="10" fill="#d7e8f2"/><text class="box" x="1437.5" y="241">zero invalid lanes</text><path class="arrow" d="M1240 240 H1313"/><text class="lane" x="72" y="396">Local reduction</text><text class="lane-note" x="72" y="422">FP32 fragments</text><rect class="node" x="355" y="365" width="245" height="70" rx="10" fill="#cfe9df"/><text class="box" x="477.5" y="401">sum register values</text><rect class="node" x="675" y="365" width="245" height="70" rx="10" fill="#cfe9df"/><text class="box" x="797.5" y="401">warp reduction</text><path class="arrow" d="M600 400 H673"/><rect class="node" x="995" y="365" width="245" height="70" rx="10" fill="#cfe9df"/><text class="box" x="1117.5" y="401">shared partials</text><path class="arrow" d="M920 400 H993"/><rect class="node" x="1315" y="365" width="245" height="70" rx="10" fill="#cfe9df"/><text class="box" x="1437.5" y="401">synchronize</text><path class="arrow" d="M1240 400 H1313"/><text class="lane" x="72" y="556">Row reduction</text><text class="lane-note" x="72" y="582">ReductionBase machinery</text><rect class="node" x="355" y="525" width="245" height="70" rx="10" fill="#8bcdb8"/><text class="box" x="477.5" y="561">combine warp sums</text><rect class="node" x="675" y="525" width="245" height="70" rx="10" fill="#8bcdb8"/><text class="box" x="797.5" y="561">optional mbarrier</text><path class="arrow" d="M600 560 H673"/><rect class="node" x="995" y="525" width="245" height="70" rx="10" fill="#8bcdb8"/><text class="box" x="1117.5" y="561">broadcast sum</text><path class="arrow" d="M920 560 H993"/><rect class="node" x="1315" y="525" width="245" height="70" rx="10" fill="#8bcdb8"/><text class="box" x="1437.5" y="561">one scalar per row</text><path class="arrow" d="M1240 560 H1313"/><text class="lane" x="72" y="716">Finalize</text><text class="lane-note" x="72" y="742">Only column-zero owner writes</text><rect class="node" x="355" y="685" width="245" height="70" rx="10" fill="#f2d394"/><text class="box" x="477.5" y="721">sum × scale</text><rect class="node" x="675" y="685" width="245" height="70" rx="10" fill="#f2d394"/><text class="box" x="797.5" y="721">+ ε</text><path class="arrow" d="M600 720 H673"/><rect class="node" x="995" y="685" width="245" height="70" rx="10" fill="#f2d394"/><text class="box" x="1117.5" y="721">rsqrt</text><path class="arrow" d="M920 720 H993"/><rect class="node" x="1315" y="685" width="245" height="70" rx="10" fill="#f2d394"/><text class="box" x="1437.5" y="721">store rstd[row]</text><path class="arrow" d="M1240 720 H1313"/><path class="dep" d="M477.5 275 V363"/><path class="dep" d="M797.5 435 V523"/><path class="dep" d="M1117.5 595 V683"/>
  <rect x="60" y="892" width="1680" height="62" rx="10" fill="#fff7df" stroke="#b87912" stroke-width="1.5"/>
  <text class="note" x="85" y="929">This kernel reduces sums (not squares itself); scale encodes the normalization applied to upstream partials.</text>
</svg>
