<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1500" viewBox="0 0 2400 1500" role="img" aria-labelledby="title desc">
  <title id="title">QuACK softmax backward · fused Jacobian-vector product</title>
  <desc id="desc">QuACK softmax backward · fused Jacobian-vector product. The dense Jacobian is never materialized: dxᵢ = yᵢ(dyᵢ − Σⱼ dyⱼyⱼ). Saved forward output y is sufficient; no logits, exponentials, or full Jacobian are reloaded.</desc>
  <defs>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172734; }
      .title { font-size: 42px; font-weight: 760; } .subtitle { font-size: 21px; fill: #425869; }
      .panel-title { font-size: 18px; font-weight: 780; fill: #526a79; letter-spacing: 1.2px; }
      .lane { font-size: 20px; font-weight: 730; } .lane-note { font-size: 16px; fill: #526a79; }
      .phase { font-size: 15px; font-weight: 700; fill: #607887; text-anchor: middle; letter-spacing: .7px; }
      .box { font-size: 18px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
      .mini { font-size: 15px; font-weight: 650; fill: #425869; text-anchor: middle; dominant-baseline: middle; }
      .node { stroke: #294251; stroke-width: 1.6; } .grid { stroke: #dce6ec; stroke-width: 1.2; }
      .arrow { fill: none; stroke: #526d7c; stroke-width: 2.2; marker-end: url(#arrow); }
      .dep { fill: none; stroke: #b87912; stroke-width: 2; stroke-dasharray: 6 5; marker-end: url(#gold); }
      .note { font-size: 18px; font-weight: 650; fill: #704b09; } .source { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 17px; fill: #526a79; }
      .role-summary { font-size: 18px; font-weight: 680; fill: #1e5d50; }
      .memory-label { font-size: 19px; font-weight: 760; } .mem-node { stroke: #294251; stroke-width: 1.5; }
      .mem-name { font-size: 18px; font-weight: 740; text-anchor: middle; } .mem-note { font-size: 15px; fill: #526a79; text-anchor: middle; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#526d7c"/></marker>
    <marker id="gold" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#b87912"/></marker>
  </defs>
  <rect width="2400" height="1500" fill="#f8fafb"/>
  <text class="title" x="70" y="66">QuACK softmax backward · fused Jacobian-vector product</text>
  <text class="subtitle" x="70" y="108">The dense Jacobian is never materialized: dxᵢ = yᵢ(dyᵢ − Σⱼ dyⱼyⱼ).</text>
  <text class="subtitle" x="70" y="145">CuTe DSL entry point: <tspan class="source">quack/softmax.py · SoftmaxBackward.kernel()</tspan></text>
  <text class="panel-title" x="70" y="195">WARP / WARP-GROUP ROLE TIMELINE</text>
  <text class="role-summary" x="455" y="195">cooperative CTA: participating warps follow the same phase sequence; no dedicated producer / consumer warp roles</text>
  <rect x="60" y="215" width="2280" height="730" rx="12" fill="#fff" stroke="#d4e0e7" stroke-width="1.5"/>
  <line class="grid" x1="425" y1="215" x2="425" y2="945"/>
  <line class="grid" x1="60" y1="395" x2="2340" y2="395"/><line class="grid" x1="60" y1="575" x2="2340" y2="575"/><line class="grid" x1="60" y1="755" x2="2340" y2="755"/>
  <text class="phase" x="630" y="237">SET UP / LOAD</text><text class="phase" x="1065" y="237">TRANSFORM</text><text class="phase" x="1500" y="237">SYNCHRONIZE / REDUCE</text><text class="phase" x="1935" y="237">PUBLISH / ADVANCE</text>
  <text class="lane" x="92" y="280">Global → shared</text><text class="lane-note" x="92" y="308">dy and saved y move together</text><rect class="node" x="465" y="245" width="330" height="82" rx="12" fill="#d7e8f2"/><text class="box" x="630" y="287">Tile dy + y</text><rect class="node" x="900" y="245" width="330" height="82" rx="12" fill="#d7e8f2"/><text class="box" x="1065" y="287">cp.async → sdY,sY</text><path class="arrow" d="M795 286 H897"/><rect class="node" x="1335" y="245" width="330" height="82" rx="12" fill="#d7e8f2"/><text class="box" x="1500" y="287">commit + wait</text><path class="arrow" d="M1230 286 H1332"/><rect class="node" x="1770" y="245" width="330" height="82" rx="12" fill="#d7e8f2"/><text class="box" x="1935" y="287">OOB zero-fill</text><path class="arrow" d="M1665 286 H1767"/><text class="lane" x="92" y="460">Registers</text><text class="lane-note" x="92" y="488">FP32 elementwise products</text><rect class="node" x="465" y="425" width="330" height="82" rx="12" fill="#cfe9df"/><text class="box" x="630" y="467">sdY,sY → rmem</text><rect class="node" x="900" y="425" width="330" height="82" rx="12" fill="#cfe9df"/><text class="box" x="1065" y="467">convert FP32</text><path class="arrow" d="M795 466 H897"/><rect class="node" x="1335" y="425" width="330" height="82" rx="12" fill="#cfe9df"/><text class="box" x="1500" y="467">pᵢ = dyᵢyᵢ</text><path class="arrow" d="M1230 466 H1332"/><rect class="node" x="1770" y="425" width="330" height="82" rx="12" fill="#cfe9df"/><text class="box" x="1935" y="467">hold dyᵢ,yᵢ</text><path class="arrow" d="M1665 466 H1767"/><text class="lane" x="92" y="640">Row reduction</text><text class="lane-note" x="92" y="668">Cluster-aware for wide N</text><rect class="node" x="465" y="605" width="330" height="82" rx="12" fill="#8bcdb8"/><text class="box" x="630" y="647">Σ local pᵢ</text><rect class="node" x="900" y="605" width="330" height="82" rx="12" fill="#8bcdb8"/><text class="box" x="1065" y="647">exchange partials</text><path class="arrow" d="M795 646 H897"/><rect class="node" x="1335" y="605" width="330" height="82" rx="12" fill="#8bcdb8"/><text class="box" x="1500" y="647">broadcast dot</text><path class="arrow" d="M1230 646 H1332"/><rect class="node" x="1770" y="605" width="330" height="82" rx="12" fill="#8bcdb8"/><text class="box" x="1935" y="647">dot ready</text><path class="arrow" d="M1665 646 H1767"/><text class="lane" x="92" y="820">Gradient + store</text><text class="lane-note" x="92" y="848">Single fused output pass</text><rect class="node" x="465" y="785" width="330" height="82" rx="12" fill="#f2d394"/><text class="box" x="630" y="827">dyᵢ − dot</text><rect class="node" x="900" y="785" width="330" height="82" rx="12" fill="#f2d394"/><text class="box" x="1065" y="827">× yᵢ</text><path class="arrow" d="M795 826 H897"/><rect class="node" x="1335" y="785" width="330" height="82" rx="12" fill="#f2d394"/><text class="box" x="1500" y="827">convert dx dtype</text><path class="arrow" d="M1230 826 H1332"/><rect class="node" x="1770" y="785" width="330" height="82" rx="12" fill="#f2d394"/><text class="box" x="1935" y="827">predicated store</text><path class="arrow" d="M1665 826 H1767"/><path class="dep" d="M630 327 V422"/><path class="dep" d="M1065 507 V602"/><path class="dep" d="M1500 687 V782"/>
  <rect x="70" y="975" width="2260" height="70" rx="11" fill="#fff7df" stroke="#b87912" stroke-width="1.5"/>
  <text class="note" x="100" y="1018">Saved forward output y is sufficient; no logits, exponentials, or full Jacobian are reloaded.</text>
  <text class="panel-title" x="70" y="1095">ON-CHIP MEMORY PARTITION</text>
  <rect x="60" y="1120" width="2280" height="310" rx="12" fill="#fff" stroke="#d4e0e7" stroke-width="1.5"/>
  <text class="memory-label" x="90" y="1172">SMEM</text>
  <rect class="mem-node" x="235.0" y="1140" width="674.3333333333334" height="92" rx="11" fill="#d7e8f2"/><text class="mem-name" x="572.1666666666667" y="1177">input tile(s)</text><text class="mem-note" x="572.1666666666667" y="1206">coalesced staging</text><rect class="mem-node" x="925.3333333333334" y="1140" width="674.3333333333334" height="92" rx="11" fill="#d7e8f2"/><text class="mem-name" x="1262.5" y="1177">exchange / reduce</text><text class="mem-note" x="1262.5" y="1206">barriers + partials</text><rect class="mem-node" x="1615.6666666666667" y="1140" width="674.3333333333334" height="92" rx="11" fill="#d7e8f2"/><text class="mem-name" x="1952.8333333333335" y="1177">output tile</text><text class="mem-note" x="1952.8333333333335" y="1206">when required</text>
  <text class="memory-label" x="90" y="1310">TMEM</text>
  <rect class="mem-node" x="235.0" y="1278" width="2055.0" height="92" rx="11" fill="#cfe9df"/><text class="mem-name" x="1262.5" y="1315">not applicable</text><text class="mem-note" x="1262.5" y="1344">this kernel does not use TMEM</text>
</svg>
