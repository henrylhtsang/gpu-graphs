<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1500" viewBox="0 0 2400 1500" role="img" aria-labelledby="title desc">
  <title id="title">QuACK GEMM SM90 · TMA producer, WGMMA consumer, TMA epilogue</title>
  <desc id="desc">QuACK GEMM SM90 · TMA producer, WGMMA consumer, TMA epilogue. Persistent Hopper tiles flow through staged A/B, register accumulators, and staged output stores. Load warps and MMA warpgroups use different register budgets; pipeline barriers carry ownership between them.</desc>
  <defs>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172734; }
      .title { font-size: 42px; font-weight: 760; } .subtitle { font-size: 21px; fill: #425869; }
      .panel-title { font-size: 18px; font-weight: 780; fill: #526a79; letter-spacing: 1.2px; }
      .lane { font-size: 20px; font-weight: 730; } .lane-note { font-size: 16px; fill: #526a79; }
      .phase { font-size: 15px; font-weight: 700; fill: #607887; text-anchor: middle; letter-spacing: .7px; }
      .box { font-size: 18px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
      .mini { font-size: 15px; font-weight: 650; fill: #425869; text-anchor: middle; dominant-baseline: middle; }
      .node { stroke: #294251; stroke-width: 1.6; } .grid { stroke: #dce6ec; stroke-width: 1.2; }
      .arrow { fill: none; stroke: #526d7c; stroke-width: 2.2; marker-end: url(#arrow); }
      .dep { fill: none; stroke: #b87912; stroke-width: 2; stroke-dasharray: 6 5; marker-end: url(#gold); }
      .note { font-size: 18px; font-weight: 650; fill: #704b09; } .source { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 17px; fill: #526a79; }
      .role-summary { font-size: 18px; font-weight: 680; fill: #1e5d50; }
      .memory-label { font-size: 19px; font-weight: 760; } .mem-node { stroke: #294251; stroke-width: 1.5; }
      .mem-name { font-size: 18px; font-weight: 740; text-anchor: middle; } .mem-note { font-size: 15px; fill: #526a79; text-anchor: middle; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#526d7c"/></marker>
    <marker id="gold" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#b87912"/></marker>
  </defs>
  <rect width="2400" height="1500" fill="#f8fafb"/>
  <text class="title" x="70" y="66">QuACK GEMM SM90 · TMA producer, WGMMA consumer, TMA epilogue</text>
  <text class="subtitle" x="70" y="108">Persistent Hopper tiles flow through staged A/B, register accumulators, and staged output stores.</text>
  <text class="subtitle" x="70" y="145">CuTe DSL entry point: <tspan class="source">quack/gemm_sm90.py · GemmSm90.kernel()</tspan></text>
  <text class="panel-title" x="70" y="195">WARP / WARP-GROUP ROLE TIMELINE</text>
  <text class="role-summary" x="455" y="195">warp-group roles: TMA producer · WGMMA consumer WG0 / WG1 · epilogue</text>
  <rect x="60" y="215" width="2280" height="730" rx="12" fill="#fff" stroke="#d4e0e7" stroke-width="1.5"/>
  <line class="grid" x1="425" y1="215" x2="425" y2="945"/>
  <line class="grid" x1="60" y1="395" x2="2340" y2="395"/><line class="grid" x1="60" y1="575" x2="2340" y2="575"/><line class="grid" x1="60" y1="755" x2="2340" y2="755"/>
  <text class="phase" x="630" y="237">SET UP / LOAD</text><text class="phase" x="1065" y="237">TRANSFORM</text><text class="phase" x="1500" y="237">SYNCHRONIZE / REDUCE</text><text class="phase" x="1935" y="237">PUBLISH / ADVANCE</text>
  <text class="lane" x="92" y="280">Scheduler + load warps</text><text class="lane-note" x="92" y="308">Persistent work and TMA multicast</text><rect class="node" x="465" y="245" width="330" height="82" rx="12" fill="#d7e8f2"/><text class="box" x="630" y="287">get tile (M,N,K,L)</text><rect class="node" x="900" y="245" width="330" height="82" rx="12" fill="#d7e8f2"/><text class="box" x="1065" y="287">acquire A/B stage</text><path class="arrow" d="M795 286 H897"/><rect class="node" x="1335" y="245" width="330" height="82" rx="12" fill="#d7e8f2"/><text class="box" x="1500" y="287">TMA A + B → smem</text><path class="arrow" d="M1230 286 H1332"/><rect class="node" x="1770" y="245" width="330" height="82" rx="12" fill="#d7e8f2"/><text class="box" x="1935" y="287">commit / advance</text><path class="arrow" d="M1665 286 H1767"/><text class="lane" x="92" y="460">MMA warpgroup(s)</text><text class="lane-note" x="92" y="488">WGMMA consumes staged operands</text><rect class="node" x="465" y="425" width="330" height="82" rx="12" fill="#cfe9df"/><text class="box" x="630" y="467">wait A/B full</text><rect class="node" x="900" y="425" width="330" height="82" rx="12" fill="#cfe9df"/><text class="box" x="1065" y="467">issue WGMMA k-tile</text><path class="arrow" d="M795 466 H897"/><rect class="node" x="1335" y="425" width="330" height="82" rx="12" fill="#cfe9df"/><text class="box" x="1500" y="467">wait prior group</text><path class="arrow" d="M1230 466 H1332"/><rect class="node" x="1770" y="425" width="330" height="82" rx="12" fill="#cfe9df"/><text class="box" x="1935" y="467">release A/B stage</text><path class="arrow" d="M1665 466 H1767"/><text class="lane" x="92" y="640">Ping-pong + split-K</text><text class="lane-note" x="92" y="668">Optional scheduling modes</text><rect class="node" x="465" y="605" width="330" height="82" rx="12" fill="#8bcdb8"/><text class="box" x="630" y="647">WG0 ⇄ WG1 token</text><rect class="node" x="900" y="605" width="330" height="82" rx="12" fill="#8bcdb8"/><text class="box" x="1065" y="647">next persistent tile</text><path class="arrow" d="M795 646 H897"/><rect class="node" x="1335" y="605" width="330" height="82" rx="12" fill="#8bcdb8"/><text class="box" x="1500" y="647">nonfinal split → ws</text><path class="arrow" d="M1230 646 H1332"/><rect class="node" x="1770" y="605" width="330" height="82" rx="12" fill="#8bcdb8"/><text class="box" x="1935" y="647">finalizer sums partials</text><path class="arrow" d="M1665 646 H1767"/><text class="lane" x="92" y="820">Epilogue</text><text class="lane-note" x="92" y="848">Registers ↔ smem ↔ global</text><rect class="node" x="465" y="785" width="330" height="82" rx="12" fill="#f2d394"/><text class="box" x="630" y="827">visit accumulator</text><rect class="node" x="900" y="785" width="330" height="82" rx="12" fill="#f2d394"/><text class="box" x="1065" y="827">load C / apply ops</text><path class="arrow" d="M795 826 H897"/><rect class="node" x="1335" y="785" width="330" height="82" rx="12" fill="#f2d394"/><text class="box" x="1500" y="827">rmem → sD</text><path class="arrow" d="M1230 826 H1332"/><rect class="node" x="1770" y="785" width="330" height="82" rx="12" fill="#f2d394"/><text class="box" x="1935" y="827">TMA store D</text><path class="arrow" d="M1665 826 H1767"/><path class="dep" d="M630 327 V422"/><path class="dep" d="M1065 507 V602"/><path class="dep" d="M1500 687 V782"/>
  <rect x="70" y="975" width="2260" height="70" rx="11" fill="#fff7df" stroke="#b87912" stroke-width="1.5"/>
  <text class="note" x="100" y="1018">Load warps and MMA warpgroups use different register budgets; pipeline barriers carry ownership between them.</text>
  <text class="panel-title" x="70" y="1095">ON-CHIP MEMORY PARTITION</text>
  <rect x="60" y="1120" width="2280" height="310" rx="12" fill="#fff" stroke="#d4e0e7" stroke-width="1.5"/>
  <text class="memory-label" x="90" y="1172">SMEM</text>
  <rect class="mem-node" x="235.0" y="1140" width="674.3333333333334" height="92" rx="11" fill="#d7e8f2"/><text class="mem-name" x="572.1666666666667" y="1177">A stages</text><text class="mem-note" x="572.1666666666667" y="1206">multicast TMA</text><rect class="mem-node" x="925.3333333333334" y="1140" width="674.3333333333334" height="92" rx="11" fill="#d7e8f2"/><text class="mem-name" x="1262.5" y="1177">B stages</text><text class="mem-note" x="1262.5" y="1206">multicast TMA</text><rect class="mem-node" x="1615.6666666666667" y="1140" width="674.3333333333334" height="92" rx="11" fill="#d7e8f2"/><text class="mem-name" x="1952.8333333333335" y="1177">D stages</text><text class="mem-note" x="1952.8333333333335" y="1206">TMA store</text>
  <text class="memory-label" x="90" y="1310">TMEM</text>
  <rect class="mem-node" x="235.0" y="1278" width="2055.0" height="92" rx="11" fill="#cfe9df"/><text class="mem-name" x="1262.5" y="1315">not present</text><text class="mem-note" x="1262.5" y="1344">SM90 accumulators live in registers</text>
