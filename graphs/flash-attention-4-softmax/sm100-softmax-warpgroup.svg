<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1750" viewBox="0 0 2400 1750" role="img" aria-labelledby="title desc">
  <title id="title">What the FlashAttention-4 SM100 softmax warpgroup does</title>
  <desc id="desc">For head dimension 128 and q stage 2, four softmax warps wait for a score tile in tensor memory, load scores into registers, apply score modifications and masking, update the online row maximum, publish the accumulator rescale factor to a separate correction warpgroup, exponentiate and convert probabilities, store the first three quarters of P to tensor memory so PV can begin, store the final quarter, then update the online row sum. A second four-warp group runs the same program for the other Q stage.</desc>
  <defs>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172734; }
      .title { font-size: 34px; font-weight: 760; }
      .subtitle { font-size: 17px; fill: #425869; }
      .lane-title { font-size: 16px; font-weight: 730; }
      .lane-note { font-size: 13px; fill: #425869; }
      .box-text { font-size: 15px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
      .small { font-size: 12px; font-weight: 650; fill: #425869; }
      .code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .grid { stroke: #dce5eb; stroke-width: 1.2; }
      .outline { stroke: #273e4e; stroke-width: 1.6; }
      .mma { fill: #63c2aa; }
      .soft { fill: #8acbb8; }
      .soft2 { fill: #b8e1d7; }
      .mask { fill: #d8e8ee; }
      .stat { fill: #f1d18e; }
      .corr { fill: #f4dda9; }
      .pv { fill: #a887c5; }
      .wait { fill: #eef3f6; stroke-dasharray: 5 4; }
      .arrow { fill: none; stroke: #526d7c; stroke-width: 2.2; marker-end: url(#arrow); }
      .early { fill: none; stroke: #bb7500; stroke-width: 2.4; marker-end: url(#arrow-early); }
      .late { fill: none; stroke: #7953a5; stroke-width: 2.2; stroke-dasharray: 7 5; marker-end: url(#arrow-late); }
      .bracket { fill: none; stroke: #7d919e; stroke-width: 1.5; stroke-dasharray: 5 4; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#526d7c"/></marker>
    <marker id="arrow-early" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#bb7500"/></marker>
    <marker id="arrow-late" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#7953a5"/></marker>
  </defs>
  <rect width="2400" height="1750" fill="#f8fafb"/>
  <g transform="translate(48 10) scale(1.22)">

  <rect width="1800" height="1040" fill="#f8fafb"/>
  <text class="title" x="60" y="58">What does the FA4 softmax warpgroup do on SM100?</text>
  <text class="subtitle" x="60" y="94">D = 128 · q_stage = 2 · dense TMA path · four warps per Q stage</text>
  <text class="subtitle" x="60" y="122">It turns one QK score tile in TMEM into P, while publishing early signals that let correction and PV overlap its work.</text>

  <rect x="50" y="155" width="1700" height="820" rx="8" fill="#fff" stroke="#d4e0e7" stroke-width="1.4"/>
  <line class="grid" x1="310" y1="155" x2="310" y2="975"/>
  <line class="grid" x1="50" y1="270" x2="1750" y2="270"/>
  <line class="grid" x1="50" y1="650" x2="1750" y2="650"/>
  <line class="grid" x1="50" y1="790" x2="1750" y2="790"/>
  <line class="grid" x1="50" y1="900" x2="1750" y2="900"/>

  <text class="lane-title" x="70" y="192">Two groups, same program</text>
  <text class="lane-note" x="70" y="218">warps 0–3 → Q stage 0</text>
  <text class="lane-note" x="70" y="239">warps 4–7 → Q stage 1</text>

  <text class="lane-title" x="70" y="310">One softmax group</text>
  <text class="lane-note" x="70" y="336">four warps cooperatively cover</text>
  <text class="lane-note" x="70" y="355">the rows of one 128×128 tile</text>

  <text class="lane-title" x="70" y="690">Separate correction WG</text>
  <text class="lane-note" x="70" y="716">warps 8–11 consume α</text>
  <text class="lane-note" x="70" y="735">and rescale O only if needed</text>

  <text class="lane-title" x="70" y="830">MMA warp 12</text>
  <text class="lane-note" x="70" y="856">consumes split P from TMEM</text>

  <text class="lane-title" x="70" y="938">Softmax state</text>
  <text class="lane-note" x="70" y="960">maintained per row across K tiles</text>

  <!-- The two Q-stage groups. -->
  <rect class="soft outline" x="350" y="181" width="250" height="58" rx="9"/>
  <text class="box-text" x="475" y="203">softmax0 · warps 0–3</text>
  <text class="small" x="475" y="226" text-anchor="middle">Q stage 0 · rows 0–127</text>
  <rect class="pv outline" x="640" y="181" width="250" height="58" rx="9"/>
  <text class="box-text" x="765" y="203">softmax1 · warps 4–7</text>
  <text class="small" x="765" y="226" text-anchor="middle">Q stage 1 · rows 128–255</text>
  <path class="arrow" d="M600 210 H638"/>
  <rect class="wait outline" x="965" y="181" width="555" height="58" rx="9"/>
  <text class="box-text" x="1242" y="202">stage index selects a different S / P / O TMEM region</text>
  <text class="small" x="1242" y="226" text-anchor="middle">both groups execute <tspan class="code">softmax_loop()</tspan>; pipeline barriers keep reuse safe</text>

  <!-- Main softmax work, wrapped over three rows for readable detail. -->
  <rect class="wait outline" x="350" y="302" width="180" height="72" rx="9"/>
  <text class="box-text" x="440" y="325">wait for S<tspan baseline-shift="sub" font-size="11">i</tspan></text>
  <text class="small" x="440" y="353" text-anchor="middle">MMA→softmax barrier</text>
  <rect class="mask outline" x="565" y="302" width="210" height="72" rx="9"/>
  <text class="box-text" x="670" y="325">TMEM → registers</text>
  <text class="small" x="670" y="353" text-anchor="middle">128×128 FP32 score tile</text>
  <rect class="mask outline" x="810" y="302" width="230" height="72" rx="9"/>
  <text class="box-text" x="925" y="325">score mod + mask</text>
  <text class="small" x="925" y="353" text-anchor="middle">optional mod; causal/local edges</text>
  <rect class="stat outline" x="1075" y="302" width="235" height="72" rx="9"/>
  <text class="box-text" x="1192" y="325">update row max m<tspan baseline-shift="sub" font-size="11">i</tspan></text>
  <text class="small" x="1192" y="353" text-anchor="middle">derive α<tspan baseline-shift="sub" font-size="10">i</tspan> for old accumulator</text>
  <rect class="soft2 outline" x="1345" y="302" width="315" height="72" rx="9"/>
  <text class="box-text" x="1502" y="325">publish α<tspan baseline-shift="sub" font-size="11">i</tspan> immediately</text>
  <text class="small" x="1502" y="353" text-anchor="middle">named-barrier signal to correction WG</text>
  <path class="arrow" d="M530 338 H563"/>
  <path class="arrow" d="M775 338 H808"/>
  <path class="arrow" d="M1040 338 H1073"/>
  <path class="early" d="M1310 338 H1343"/>

  <rect class="soft outline" x="440" y="430" width="250" height="72" rx="9"/>
  <text class="box-text" x="565" y="453">subtract max + exp2</text>
  <text class="small" x="565" y="481" text-anchor="middle">scale scores and form exp values</text>
  <rect class="soft outline" x="725" y="430" width="245" height="72" rx="9"/>
  <text class="box-text" x="847" y="453">convert probability P<tspan baseline-shift="sub" font-size="11">i</tspan></text>
  <text class="small" x="847" y="481" text-anchor="middle">FP32 → FP16 / BF16</text>
  <rect class="soft2 outline" x="1005" y="430" width="265" height="72" rx="9"/>
  <text class="box-text" x="1137" y="453">store first ¾ P to TMEM</text>
  <text class="small" x="1137" y="481" text-anchor="middle">fence, then release first barrier</text>
  <rect class="soft2 outline" x="1305" y="430" width="240" height="72" rx="9"/>
  <text class="box-text" x="1425" y="453">store final ¼ P</text>
  <text class="small" x="1425" y="481" text-anchor="middle">fence + last-split signal</text>
  <path class="arrow" d="M1502 374 V400 H565 V428"/>
  <path class="arrow" d="M690 466 H723"/>
  <path class="arrow" d="M970 466 H1003"/>
  <path class="arrow" d="M1270 466 H1303"/>

  <rect class="stat outline" x="625" y="558" width="260" height="64" rx="9"/>
  <text class="box-text" x="755" y="579">update row sum ℓ<tspan baseline-shift="sub" font-size="11">i</tspan></text>
  <text class="small" x="755" y="605" text-anchor="middle">online state for the next K tile</text>
  <rect class="stat outline" x="930" y="558" width="360" height="64" rx="9"/>
  <text class="box-text" x="1110" y="579">at tile end: publish final row sum / max</text>
  <text class="small" x="1110" y="605" text-anchor="middle">correction/epilogue derives normalization and optional LSE</text>
  <path class="arrow" d="M1425 502 V530 H755 V556"/>
  <path class="arrow" d="M885 590 H928"/>
  <path class="bracket" d="M350 396 H1660"/>
  <text class="small" x="1005" y="413" text-anchor="middle">α branch and P generation run independently after the row-max update</text>

  <!-- Handoffs are deliberately in different lanes: the softmax WG does not rescale O or issue PV. -->
  <rect class="corr outline" x="1005" y="676" width="305" height="72" rx="9"/>
  <text class="box-text" x="1157" y="699">O<tspan baseline-shift="sub" font-size="11">i</tspan> ← α<tspan baseline-shift="sub" font-size="11">i</tspan> · O<tspan baseline-shift="sub" font-size="11">i</tspan></text>
  <text class="small" x="1157" y="727" text-anchor="middle">skip when all rows have α = 1</text>
  <rect class="wait outline" x="1350" y="676" width="310" height="72" rx="9"/>
  <text class="box-text" x="1505" y="699">signal “O rescaled”</text>
  <text class="small" x="1505" y="727" text-anchor="middle">joins first-¾-P readiness for PV</text>
  <path class="early" d="M1502 374 V645 H1157 V674"/>
  <path class="early" d="M1310 712 H1348"/>

  <rect class="pv outline" x="1005" y="814" width="305" height="64" rx="9"/>
  <text class="box-text" x="1157" y="835">begin P<tspan baseline-shift="sub" font-size="11">i</tspan>V<tspan baseline-shift="sub" font-size="11">i</tspan> → O<tspan baseline-shift="sub" font-size="11">i</tspan></text>
  <text class="small" x="1157" y="861" text-anchor="middle">after first ¾ P + corrected O</text>
  <rect class="pv outline" x="1350" y="814" width="310" height="64" rx="9"/>
  <text class="box-text" x="1505" y="835">wait inside PV for final ¼</text>
  <text class="small" x="1505" y="861" text-anchor="middle">PV completion gates the next QK issue</text>
  <path class="early" d="M1137 502 V778 H1100 V812"/>
  <path class="early" d="M1505 748 V812"/>
  <path class="late" d="M1425 502 V778 H1560 V812"/>
  <path class="arrow" d="M1310 846 H1348"/>

  <rect class="stat outline" x="350" y="922" width="390" height="38" rx="9"/>
  <text class="box-text" x="545" y="941">m<tspan baseline-shift="sub" font-size="11">i</tspan> = running row maximum</text>
  <rect class="stat outline" x="775" y="922" width="390" height="38" rx="9"/>
  <text class="box-text" x="970" y="941">ℓ<tspan baseline-shift="sub" font-size="11">i</tspan> = running sum of exponentials</text>
  <rect class="stat outline" x="1200" y="922" width="460" height="38" rx="9"/>
  <text class="box-text" x="1430" y="941">α<tspan baseline-shift="sub" font-size="11">i</tspan> rescales O when m<tspan baseline-shift="sub" font-size="11">i</tspan> increases</text>
  <text class="small code" x="1725" y="1007" text-anchor="end">flash_attn/cute/flash_fwd_sm100.py · softmax_loop / softmax_step</text>
  </g>
  <text x="70" y="1332" font-size="20" font-weight="780" fill="#526a79" letter-spacing="1.2">ON-CHIP MEMORY PARTITION</text>
  <rect x="60" y="1355" width="2280" height="315" rx="12" fill="#fff" stroke="#d4e0e7" stroke-width="1.5"/>
  <text x="90" y="1412" font-size="20" font-weight="760">SMEM</text>
  <rect x="235" y="1378" width="650" height="92" rx="11" fill="#d8ebe5" stroke="#273e4e" stroke-width="1.5"/><text x="560" y="1418" text-anchor="middle" font-size="19" font-weight="730">Q / K / V stage ring</text><text x="560" y="1447" text-anchor="middle" font-size="16" fill="#526a79">TMA producer-owned operands</text>
  <rect x="905" y="1378" width="650" height="92" rx="11" fill="#d8ebe5" stroke="#273e4e" stroke-width="1.5"/><text x="1230" y="1418" text-anchor="middle" font-size="19" font-weight="730">P handoff / reduction scratch</text><text x="1230" y="1447" text-anchor="middle" font-size="16" fill="#526a79">softmax → PV synchronization</text>
  <rect x="1575" y="1378" width="715" height="92" rx="11" fill="#d8ebe5" stroke="#273e4e" stroke-width="1.5"/><text x="1932" y="1418" text-anchor="middle" font-size="19" font-weight="730">output staging + barriers</text><text x="1932" y="1447" text-anchor="middle" font-size="16" fill="#526a79">correction / epilogue handoff</text>
  <text x="90" y="1553" font-size="20" font-weight="760">TMEM</text>
  <rect x="235" y="1518" width="650" height="92" rx="11" fill="#cfe9df" stroke="#273e4e" stroke-width="1.5"/><text x="560" y="1558" text-anchor="middle" font-size="19" font-weight="730">score tile S</text><text x="560" y="1587" text-anchor="middle" font-size="16" fill="#526a79">partitioned by Q stage / softmax WG</text>
  <rect x="905" y="1518" width="650" height="92" rx="11" fill="#cfe9df" stroke="#273e4e" stroke-width="1.5"/><text x="1230" y="1558" text-anchor="middle" font-size="19" font-weight="730">PV / O accumulators</text><text x="1230" y="1587" text-anchor="middle" font-size="16" fill="#526a79">MMA-owned output columns</text>
  <rect x="1575" y="1518" width="715" height="92" rx="11" fill="#cfe9df" stroke="#273e4e" stroke-width="1.5"/><text x="1932" y="1558" text-anchor="middle" font-size="19" font-weight="730">correction-visible slices</text><text x="1932" y="1587" text-anchor="middle" font-size="16" fill="#526a79">released after rescale / consumption</text>
</svg>
