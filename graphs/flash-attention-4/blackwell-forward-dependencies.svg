<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1750" viewBox="0 0 2400 1750" role="img" aria-labelledby="title desc">
<title id="title">FlashAttention-4 forward: Blackwell overlap and dependencies</title>
<desc id="desc">A swimlane dependency graph showing loads, QK and PV matrix operations, two softmax warp groups, and output correction during the FlashAttention-4 forward pass.</desc>
<defs><style>
.t{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-size:35px;font-weight:700;fill:#14232e}.s{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-size:18px;font-weight:500;fill:#435763}.l{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-size:17px;font-weight:700;fill:#263844}.ls{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-size:15px;font-weight:500;fill:#435763}.x{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-size:16px;font-weight:600;fill:#172630;text-anchor:middle;dominant-baseline:middle}.n{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-size:14px;font-weight:600;fill:#405461;text-anchor:middle}.g{stroke:#d9e2e8;stroke-width:1}.b{stroke:#263844;stroke-width:1.6;rx:9}.a{stroke:#536f7d;stroke-width:2.3;fill:none;marker-end:url(#m)}.dep{stroke:#b27b1e;stroke-width:2.5;fill:none;marker-end:url(#gold)}
</style><marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#536f7d"/></marker><marker id="gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#b27b1e"/></marker></defs>
<rect width="2400" height="1750" fill="#f8fafb"/>
<g transform="translate(48 10) scale(1.28)">
<rect width="1800" height="920" fill="#fbfcfd"/>
<text x="60" y="60" class="t">FlashAttention-4 forward · Blackwell overlap and dependencies</text>
<text x="60" y="96" class="s">q_stage=2, dense TMA path. One warp issues all QK and PV MMAs; correction rescales only when α &lt; 1.</text>
<text x="60" y="125" class="s">Row-max produces α early. Correction overlaps P generation; PV starts at ¾ P and waits internally for the final ¼.</text>

<g transform="translate(60 165)">
 <g class="g"><path d="M285 0V650M405 0V650M525 0V650M645 0V650M765 0V650M885 0V650M1005 0V650M1125 0V650M1245 0V650M1365 0V650M1485 0V650M1605 0V650M1725 0V650"/><path d="M0 0H1725M0 85H1725M0 210H1725M0 335H1725M0 460H1725M0 585H1725M0 650H1725"/></g>
 <text x="10" y="36" class="l">Warp 14 · load</text><text x="10" y="60" class="ls">Q₀, Q₁ and streamed K/V</text>
 <text x="10" y="145" class="l">Warp 12 · MMA issuer</text><text x="10" y="170" class="ls">one row for all UMMA issue</text>
 <text x="10" y="270" class="l">Warps 0–3 · softmax Q₀</text><text x="10" y="295" class="ls">S₀ → P₀ and rescale factor</text>
 <text x="10" y="395" class="l">Warps 4–7 · softmax Q₁</text><text x="10" y="420" class="ls">S₁ → P₁ and rescale factor</text>
 <text x="10" y="520" class="l">Warps 8–11 · correction</text><text x="10" y="545" class="ls">rescale accumulated O₀ / O₁</text>
 <text x="10" y="625" class="l">Critical dependency</text>

 <!-- loads -->
 <rect x="285" y="18" width="105" height="49" class="b" fill="#d6e5f0"/><text x="337" y="43" class="x">Load Q₀</text>
 <rect x="400" y="18" width="105" height="49" class="b" fill="#e4d9ee"/><text x="452" y="43" class="x">Load Q₁</text>
 <rect x="515" y="18" width="105" height="49" class="b" fill="#cde8df"/><text x="567" y="43" class="x">Load Kⱼ</text>
 <rect x="630" y="18" width="105" height="49" class="b" fill="#cde8df"/><text x="682" y="43" class="x">Load Vⱼ</text>
 <rect x="745" y="18" width="120" height="49" class="b" fill="#cde8df"/><text x="805" y="43" class="x">Load Kⱼ₊₁</text>
 <rect x="875" y="18" width="120" height="49" class="b" fill="#cde8df"/><text x="935" y="43" class="x">Load Vⱼ₊₁</text>

 <!-- single MMA row -->
 <rect x="515" y="113" width="145" height="60" class="b" fill="#67c4a7"/><text x="587" y="143" class="x">Q₀Kⱼ → S₀</text>
 <rect x="670" y="113" width="145" height="60" class="b" fill="#a47fc3"/><text x="742" y="143" class="x">Q₁Kⱼ → S₁</text>
 <rect x="1040" y="113" width="145" height="60" class="b" fill="#67c4a7"/><text x="1112" y="143" class="x">P₀Vⱼ → O₀</text>
 <rect x="1195" y="113" width="165" height="60" class="b" fill="#67c4a7"/><text x="1277" y="143" class="x">Q₀Kⱼ₊₁ → S₀</text>
 <rect x="1370" y="113" width="145" height="60" class="b" fill="#a47fc3"/><text x="1442" y="143" class="x">P₁Vⱼ → O₁</text>
 <rect x="1525" y="113" width="165" height="60" class="b" fill="#a47fc3"/><text x="1607" y="143" class="x">Q₁Kⱼ₊₁ → S₁</text>

 <!-- softmax: row-max produces alpha before P is complete -->
 <rect x="650" y="238" width="470" height="60" class="b" fill="#86ceb8"/>
 <path d="M760 238V298M1000 238V298" stroke="#263844" stroke-width="1.2"/>
 <text x="705" y="268" class="x">row max → α₀</text><text x="880" y="268" class="x">exp/store first ¾ P₀</text><text x="1060" y="268" class="x">final ¼</text>
 <rect x="805" y="363" width="645" height="60" class="b" fill="#b092cb"/>
 <path d="M915 363V423M1300 363V423" stroke="#263844" stroke-width="1.2"/>
 <text x="860" y="393" class="x">row max → α₁</text><text x="1107" y="393" class="x">exp/store first ¾ P₁</text><text x="1375" y="393" class="x">final ¼</text>
 <path d="M660 143H680V238" class="a"/><path d="M815 143H835V363" class="a"/>

 <!-- correction -->
 <rect x="830" y="488" width="220" height="60" class="b" fill="#f1d194"/><text x="940" y="518" class="x">O₀ ← α₀ · O₀</text>
 <rect x="1060" y="488" width="220" height="60" class="b" fill="#f1d194"/><text x="1170" y="518" class="x">O₁ ← α₁ · O₁</text>
 <path d="M760 298V465H940V488" class="a"/><path d="M915 423V445H1170V488" class="a"/>

 <!-- direct readiness deps into PV -->
 <path d="M1000 268H1020V195H1112V173" class="dep"/><text x="1045" y="222" class="n">first ¾ P₀ ready</text>
 <path d="M940 488V205H1080V173" class="dep"/><text x="1010" y="470" class="n">O₀ rescaled</text>
 <path d="M1300 393H1325V205H1442V173" class="dep"/><text x="1340" y="365" class="n">first ¾ P₁ ready</text>
 <path d="M1170 488V225H1405V173" class="dep"/><text x="1280" y="470" class="n">O₁ rescaled</text>

 <!-- PV starts on the early P signal, then stalls internally until the final quarter arrives -->
 <path d="M1120 268H1160V143" class="dep" stroke-dasharray="6 5"/><text x="1142" y="252" class="n">final ¼</text>
 <path d="M1450 393H1490V143" class="dep" stroke-dasharray="6 5"/><text x="1470" y="377" class="n">final ¼</text>

 <!-- serial issue ordering -->
 <path d="M1185 143H1195" class="a"/><path d="M1515 143H1525" class="a"/>
 <text x="1277" y="196" class="n">PV₀ finishes before next QK₀</text><text x="1607" y="196" class="n">PV₁ finishes before next QK₁</text>

 <path d="M590 620H1600" class="a"/><text x="1095" y="644" class="n">α branches to correction ∥ P generation → ¾ P + corrected O start PV → final ¼ unblocks PV → next QK</text>
</g>
 </g>
 <text x="70" y="1260" font-size="20" font-weight="780" fill="#526a79" letter-spacing="1.2">ON-CHIP MEMORY PARTITION</text>
 <rect x="60" y="1285" width="2280" height="385" rx="12" fill="#fff" stroke="#d4e0e7" stroke-width="1.5"/>
 <text x="90" y="1350" font-size="20" font-weight="760">SMEM</text>
 <rect x="235" y="1315" width="475" height="100" rx="11" fill="#d8ebe5" stroke="#273e4e" stroke-width="1.5"/><text x="472" y="1358" text-anchor="middle" font-size="19" font-weight="730">Q stages</text><text x="472" y="1388" text-anchor="middle" font-size="16" fill="#526a79">q_stage-partitioned tiles</text>
 <rect x="730" y="1315" width="475" height="100" rx="11" fill="#d8ebe5" stroke="#273e4e" stroke-width="1.5"/><text x="967" y="1358" text-anchor="middle" font-size="19" font-weight="730">K / V stage rings</text><text x="967" y="1388" text-anchor="middle" font-size="16" fill="#526a79">load-warp ownership</text>
 <rect x="1225" y="1315" width="475" height="100" rx="11" fill="#d8ebe5" stroke="#273e4e" stroke-width="1.5"/><text x="1462" y="1358" text-anchor="middle" font-size="19" font-weight="730">P + scale handoff</text><text x="1462" y="1388" text-anchor="middle" font-size="16" fill="#526a79">softmax / correction signals</text>
 <rect x="1720" y="1315" width="570" height="100" rx="11" fill="#d8ebe5" stroke="#273e4e" stroke-width="1.5"/><text x="2005" y="1358" text-anchor="middle" font-size="19" font-weight="730">output / barrier storage</text><text x="2005" y="1388" text-anchor="middle" font-size="16" fill="#526a79">epilogue and stage ownership</text>
 <text x="90" y="1507" font-size="20" font-weight="760">TMEM</text>
 <rect x="235" y="1470" width="650" height="100" rx="11" fill="#cfe9df" stroke="#273e4e" stroke-width="1.5"/><text x="560" y="1513" text-anchor="middle" font-size="19" font-weight="730">QK score partitions</text><text x="560" y="1543" text-anchor="middle" font-size="16" fill="#526a79">softmax-consumed columns</text>
 <rect x="905" y="1470" width="650" height="100" rx="11" fill="#cfe9df" stroke="#273e4e" stroke-width="1.5"/><text x="1230" y="1513" text-anchor="middle" font-size="19" font-weight="730">PV / O accumulators</text><text x="1230" y="1543" text-anchor="middle" font-size="16" fill="#526a79">correction-visible slices</text>
 <rect x="1575" y="1470" width="715" height="100" rx="11" fill="#cfe9df" stroke="#273e4e" stroke-width="1.5"/><text x="1932" y="1513" text-anchor="middle" font-size="19" font-weight="730">stage-dependent reuse</text><text x="1932" y="1543" text-anchor="middle" font-size="16" fill="#526a79">columns released after consumers finish</text>
</svg>
