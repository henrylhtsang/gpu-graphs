  <text class="title" x="70" y="66">CUTLASS · 93 blackwell low latency gqa</text>
  <text class="subtitle" x="70" y="108">Blackwell low-latency grouped-query attention · representative steady-state role ownership and memory handoffs</text>
  <text class="source" x="70" y="145">examples/93_blackwell_low_latency_gqa · audited at 2802e228</text>
  <text class="panel" x="70" y="198">WARP / WARP-GROUP ROLE TIMELINE</text>
  <rect x="60" y="220" width="2280" height="770" rx="12" fill="#fff" stroke="#d4e0e7" stroke-width="1.5"/>
  <line class="grid" x1="490" y1="220" x2="490" y2="990"/>
  <line class="grid" x1="60" y1="460" x2="2340" y2="460"/><line class="grid" x1="60" y1="650" x2="2340" y2="650"/><line class="grid" x1="60" y1="840" x2="2340" y2="840"/>
  <text class="phase" x="710" y="276">ASSIGN / ACQUIRE</text><text class="phase" x="1160" y="276">LOAD / ISSUE</text><text class="phase" x="1610" y="276">CONSUME / HANDOFF</text><text class="phase" x="2060" y="276">PUBLISH / ADVANCE</text>
  <text class="role" x="94" y="334">Warp 0 · DMA-Q</text><text class="role-note" x="94" y="363">single-stage TMA producer</text><rect class="node" x="535" y="300" width="350" height="88" rx="12" fill="#d7e8f2"/><text class="box" x="710" y="349">load Q tile</text><rect class="node" x="985" y="300" width="350" height="88" rx="12" fill="#d7e8f2"/><text class="box" x="1160" y="349">commit Q barrier</text><path class="arrow" d="M885 344 H982"/><rect class="node" x="1435" y="300" width="350" height="88" rx="12" fill="#d7e8f2"/><text class="box" x="1610" y="349">publish Q ready</text><path class="arrow" d="M1335 344 H1432"/><rect class="node" x="1885" y="300" width="350" height="88" rx="12" fill="#d7e8f2"/><text class="box" x="2060" y="349">advance work tile</text><path class="arrow" d="M1785 344 H1882"/><text class="role" x="94" y="524">Warp 1 · DMA-KV</text><text class="role-note" x="94" y="553">K then V / paged indices</text><rect class="node" x="535" y="490" width="350" height="88" rx="12" fill="#cfe9df"/><text class="box" x="710" y="539">load K (+ page index)</text><rect class="node" x="985" y="490" width="350" height="88" rx="12" fill="#cfe9df"/><text class="box" x="1160" y="539">commit K stage</text><path class="arrow" d="M885 534 H982"/><rect class="node" x="1435" y="490" width="350" height="88" rx="12" fill="#cfe9df"/><text class="box" x="1610" y="539">load V (+ next index)</text><path class="arrow" d="M1335 534 H1432"/><rect class="node" x="1885" y="490" width="350" height="88" rx="12" fill="#cfe9df"/><text class="box" x="2060" y="539">release K/V stage</text><path class="arrow" d="M1785 534 H1882"/><text class="role" x="94" y="714">Warp 2 · MMA</text><text class="role-note" x="94" y="743">dual-BMM tcgen05 issuer</text><rect class="node" x="535" y="680" width="350" height="88" rx="12" fill="#b9dfd3"/><text class="box" x="710" y="729">allocate Acc1 / Acc2 TMEM</text><rect class="node" x="985" y="680" width="350" height="88" rx="12" fill="#b9dfd3"/><text class="box" x="1160" y="729">BMM1: K × Q → scores</text><path class="arrow" d="M885 724 H982"/><rect class="node" x="1435" y="680" width="350" height="88" rx="12" fill="#b9dfd3"/><text class="box" x="1610" y="729">BMM2: V × P → output</text><path class="arrow" d="M1335 724 H1432"/><rect class="node" x="1885" y="680" width="350" height="88" rx="12" fill="#b9dfd3"/><text class="box" x="2060" y="729">signal TMEM consumers</text><path class="arrow" d="M1785 724 H1882"/><text class="role" x="94" y="904">Warps 4–7 · epilogue</text><text class="role-note" x="94" y="933">warp 3 intentionally unused</text><rect class="node" x="535" y="870" width="350" height="88" rx="12" fill="#f2d394"/><text class="box" x="710" y="919">TMEM Acc1 → scores</text><rect class="node" x="985" y="870" width="350" height="88" rx="12" fill="#f2d394"/><text class="box" x="1160" y="919">online max / sum + P</text><path class="arrow" d="M885 914 H982"/><rect class="node" x="1435" y="870" width="350" height="88" rx="12" fill="#f2d394"/><text class="box" x="1610" y="919">correct TMEM Acc2</text><path class="arrow" d="M1335 914 H1432"/><rect class="node" x="1885" y="870" width="350" height="88" rx="12" fill="#f2d394"/><text class="box" x="2060" y="919">cluster reduce + output</text><path class="arrow" d="M1785 914 H1882"/><path class="handoff" d="M710 388 V487"/><path class="handoff" d="M1160 578 V677"/><path class="handoff" d="M1610 768 V867"/>
  <text class="panel" x="70" y="1040">ON-CHIP MEMORY PARTITION</text>
  <rect x="60" y="1065" width="2280" height="310" rx="12" fill="#fff" stroke="#d4e0e7" stroke-width="1.5"/>
  <text class="memory-label" x="90" y="1120">SMEM</text>
  <rect class="mem" x="235.0" y="1087" width="501.75" height="92" rx="12" fill="#d7e8f2"/><text class="mem-name" x="485.875" y="1124">Q + K/V stages</text><text class="mem-note" x="485.875" y="1153">DMA operands</text><rect class="mem" x="752.75" y="1087" width="501.75" height="92" rx="12" fill="#d7e8f2"/><text class="mem-name" x="1003.625" y="1124">S / P aliased views</text><text class="mem-note" x="1003.625" y="1153">dual-BMM handoff</text><rect class="mem" x="1270.5" y="1087" width="501.75" height="92" rx="12" fill="#d7e8f2"/><text class="mem-name" x="1521.375" y="1124">max/sum mailboxes</text><text class="mem-note" x="1521.375" y="1153">warp + cluster reduce</text><rect class="mem" x="1788.25" y="1087" width="501.75" height="92" rx="12" fill="#d7e8f2"/><text class="mem-name" x="2039.125" y="1124">Acc / page-index scratch</text><text class="mem-note" x="2039.125" y="1153">split + paged modes</text>
  <text class="memory-label" x="90" y="1256">TMEM</text>
  <rect class="mem" x="235.0" y="1223" width="674.3333333333334" height="92" rx="12" fill="#cfe9df"/><text class="mem-name" x="572.1666666666667" y="1260">Acc1 columns</text><text class="mem-note" x="572.1666666666667" y="1289">BMM1 scores</text><rect class="mem" x="925.3333333333334" y="1223" width="674.3333333333334" height="92" rx="12" fill="#cfe9df"/><text class="mem-name" x="1262.5" y="1260">Acc2 columns</text><text class="mem-note" x="1262.5" y="1289">BMM2 output</text><rect class="mem" x="1615.6666666666667" y="1223" width="674.3333333333334" height="92" rx="12" fill="#cfe9df"/><text class="mem-name" x="1952.8333333333335" y="1260">&lt; half capacity</text><text class="mem-note" x="1952.8333333333335" y="1289">allows next-kernel overlap</text>
