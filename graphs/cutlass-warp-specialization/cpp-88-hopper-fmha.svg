<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1500" viewBox="0 0 2400 1500" role="img" aria-labelledby="title desc">
  <title id="title">CUTLASS 88 hopper fmha warp-specialization timeline</title>
  <desc id="desc">Warp and warp-group role timeline plus SMEM and TMEM partition for CUTLASS examples/88_hopper_fmha. Focus: fused attention load, MMA, online-softmax, correction, and epilogue overlap.</desc>
  <defs>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172734; }
      .title { font-size: 42px; font-weight: 780; } .subtitle { font-size: 20px; fill: #425869; }
      .source { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 16px; fill: #526a79; }
      .panel { font-size: 18px; font-weight: 790; fill: #526a79; letter-spacing: 1.2px; }
      .phase { font-size: 15px; font-weight: 720; text-anchor: middle; fill: #607887; letter-spacing: .7px; }
      .role { font-size: 20px; font-weight: 750; } .role-note { font-size: 16px; fill: #526a79; }
      .box { font-size: 18px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
      .node, .mem { stroke: #294251; stroke-width: 1.6; } .grid { stroke: #dce6ec; stroke-width: 1.2; }
      .arrow { fill: none; stroke: #526d7c; stroke-width: 2.3; marker-end: url(#arrow); }
      .handoff { fill: none; stroke: #b87912; stroke-width: 2.2; stroke-dasharray: 7 5; marker-end: url(#gold); }
      .memory-label { font-size: 19px; font-weight: 770; } .mem-name { font-size: 18px; font-weight: 740; text-anchor: middle; }
      .mem-note { font-size: 15px; fill: #526a79; text-anchor: middle; } .note { font-size: 17px; font-weight: 650; fill: #704b09; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#526d7c"/></marker>
    <marker id="gold" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#b87912"/></marker>
  </defs>
  <rect width="2400" height="1500" fill="#f8fafb"/>
  <text class="title" x="70" y="66">CUTLASS · 88 hopper fmha</text>
  <text class="subtitle" x="70" y="108">Hopper attention / sequence kernel · representative steady-state role ownership and memory handoffs</text>
  <text class="source" x="70" y="145">examples/88_hopper_fmha · audited at 2802e228</text>
  <text class="panel" x="70" y="198">WARP / WARP-GROUP ROLE TIMELINE</text>
  <rect x="60" y="220" width="2280" height="770" rx="12" fill="#fff" stroke="#d4e0e7" stroke-width="1.5"/>
  <line class="grid" x1="490" y1="220" x2="490" y2="990"/>
  <line class="grid" x1="60" y1="460" x2="2340" y2="460"/><line class="grid" x1="60" y1="650" x2="2340" y2="650"/><line class="grid" x1="60" y1="840" x2="2340" y2="840"/>
  <text class="phase" x="710" y="276">ASSIGN / ACQUIRE</text><text class="phase" x="1160" y="276">LOAD / ISSUE</text><text class="phase" x="1610" y="276">CONSUME / HANDOFF</text><text class="phase" x="2060" y="276">PUBLISH / ADVANCE</text>
  <text class="role" x="94" y="334">TMA producer WG</text><text class="role-note" x="94" y="363">Q/K/V or state loads</text><rect class="node" x="535" y="300" width="350" height="88" rx="12" fill="#d7e8f2"/><text class="box" x="710" y="349">select sequence tile</text><rect class="node" x="985" y="300" width="350" height="88" rx="12" fill="#d7e8f2"/><text class="box" x="1160" y="349">acquire SMEM stage</text><path class="arrow" d="M885 344 H982"/><rect class="node" x="1435" y="300" width="350" height="88" rx="12" fill="#d7e8f2"/><text class="box" x="1610" y="349">issue TMA loads</text><path class="arrow" d="M1335 344 H1432"/><rect class="node" x="1885" y="300" width="350" height="88" rx="12" fill="#d7e8f2"/><text class="box" x="2060" y="349">commit + prefetch</text><path class="arrow" d="M1785 344 H1882"/><text class="role" x="94" y="524">Compute WG0</text><text class="role-note" x="94" y="553">WGMMA + online math</text><rect class="node" x="535" y="490" width="350" height="88" rx="12" fill="#cfe9df"/><text class="box" x="710" y="539">wait K/V stage</text><rect class="node" x="985" y="490" width="350" height="88" rx="12" fill="#cfe9df"/><text class="box" x="1160" y="539">issue QK / state MMA</text><path class="arrow" d="M885 534 H982"/><rect class="node" x="1435" y="490" width="350" height="88" rx="12" fill="#cfe9df"/><text class="box" x="1610" y="539">softmax / recurrence</text><path class="arrow" d="M1335 534 H1432"/><rect class="node" x="1885" y="490" width="350" height="88" rx="12" fill="#cfe9df"/><text class="box" x="2060" y="539">issue output MMA</text><path class="arrow" d="M1785 534 H1882"/><text class="role" x="94" y="714">Compute WG1</text><text class="role-note" x="94" y="743">overlapped consumer</text><rect class="node" x="535" y="680" width="350" height="88" rx="12" fill="#b9dfd3"/><text class="box" x="710" y="729">wait role token</text><rect class="node" x="985" y="680" width="350" height="88" rx="12" fill="#b9dfd3"/><text class="box" x="1160" y="729">consume next tile</text><path class="arrow" d="M885 724 H982"/><rect class="node" x="1435" y="680" width="350" height="88" rx="12" fill="#b9dfd3"/><text class="box" x="1610" y="729">handoff token</text><path class="arrow" d="M1335 724 H1432"/><rect class="node" x="1885" y="680" width="350" height="88" rx="12" fill="#b9dfd3"/><text class="box" x="2060" y="729">release SMEM stage</text><path class="arrow" d="M1785 724 H1882"/><text class="role" x="94" y="904">Epilogue / reduction</text><text class="role-note" x="94" y="933">register accumulator owner</text><rect class="node" x="535" y="870" width="350" height="88" rx="12" fill="#f2d394"/><text class="box" x="710" y="919">finish normalization</text><rect class="node" x="985" y="870" width="350" height="88" rx="12" fill="#f2d394"/><text class="box" x="1160" y="919">merge partial output</text><path class="arrow" d="M885 914 H982"/><rect class="node" x="1435" y="870" width="350" height="88" rx="12" fill="#f2d394"/><text class="box" x="1610" y="919">stage result</text><path class="arrow" d="M1335 914 H1432"/><rect class="node" x="1885" y="870" width="350" height="88" rx="12" fill="#f2d394"/><text class="box" x="2060" y="919">store + retire</text><path class="arrow" d="M1785 914 H1882"/><path class="handoff" d="M710 388 V487"/><path class="handoff" d="M1160 578 V677"/><path class="handoff" d="M1610 768 V867"/>
  <text class="panel" x="70" y="1040">ON-CHIP MEMORY PARTITION</text>
  <rect x="60" y="1065" width="2280" height="310" rx="12" fill="#fff" stroke="#d4e0e7" stroke-width="1.5"/>
  <text class="memory-label" x="90" y="1120">SMEM</text>
  <rect class="mem" x="235.0" y="1087" width="501.75" height="92" rx="12" fill="#d7e8f2"/><text class="mem-name" x="485.875" y="1124">Q / state</text><text class="mem-note" x="485.875" y="1153">resident tile</text><rect class="mem" x="752.75" y="1087" width="501.75" height="92" rx="12" fill="#d7e8f2"/><text class="mem-name" x="1003.625" y="1124">K/V stage ring</text><text class="mem-note" x="1003.625" y="1153">TMA → WGMMA</text><rect class="mem" x="1270.5" y="1087" width="501.75" height="92" rx="12" fill="#d7e8f2"/><text class="mem-name" x="1521.375" y="1124">P / reduction</text><text class="mem-note" x="1521.375" y="1153">handoff scratch</text><rect class="mem" x="1788.25" y="1087" width="501.75" height="92" rx="12" fill="#d7e8f2"/><text class="mem-name" x="2039.125" y="1124">output stage</text><text class="mem-note" x="2039.125" y="1153">store</text>
  <text class="memory-label" x="90" y="1256">TMEM</text>
  <rect class="mem" x="235.0" y="1223" width="2055.0" height="92" rx="12" fill="#cfe9df"/><text class="mem-name" x="1262.5" y="1260">not available on SM90</text><text class="mem-note" x="1262.5" y="1289">scores and output live in registers / SMEM</text>
  <rect x="70" y="1405" width="2260" height="62" rx="11" fill="#fff7df" stroke="#b87912" stroke-width="1.5"/>
  <text class="note" x="100" y="1443">Example focus: fused attention load, MMA, online-softmax, correction, and epilogue overlap. Exact IDs, stage counts, and extents remain configuration-dependent.</text>
